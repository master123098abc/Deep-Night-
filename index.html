        :root {

            --glass-bg: rgba(15, 15, 20, 0.7);

            --bg-color-2: #302b63;
            --bg-color-3: #0a0a0a;

        body {
            font-family: 'Montserrat', sans-serif;
            margin: 0; min-height: 100vh;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            overflow: hidden; color: #ffffff;
            background: linear-gradient(-45deg, var(--bg-color-1), var(--bg-color-2), var(--bg-color-3), var(--bg-color-4));
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            transition: background 1s ease;
        }

        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        .panel {
            background: var(--glass-bg); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 25px;
            padding: 2rem; width: 90%; max-width: 450px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.9), inset 0 0 20px rgba(255,255,255,0.05);
            text-align: center; position: relative; z-index: 10;
        }

        h1 { font-weight: 900; text-transform: uppercase; letter-spacing: 3px; background: linear-gradient(to right, #ff0055, #00e5ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        input, select { width: 100%; padding: 15px; margin: 10px 0; border-radius: 12px; border: 1px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.5); color: white; font-size: 16px; font-family: 'Montserrat', sans-serif; box-sizing: border-box; outline: none; }
        
        button { width: 100%; padding: 15px; margin: 8px 0; border-radius: 12px; font-size: 16px; font-weight: 900; text-transform: uppercase; cursor: pointer; transition: 0.3s; border: none; letter-spacing: 2px; }

        .btn-start { background: linear-gradient(45deg, #ff0055, #a200ff); color: white; box-shadow: 0 0 20px rgba(255, 0, 85, 0.6); }
        .btn-truth { background: rgba(0, 229, 255, 0.1); border: 2px solid var(--truth-neon); color: var(--truth-neon); }
        .btn-dare { background: rgba(255, 0, 85, 0.1); border: 2px solid var(--dare-neon); color: var(--dare-neon); }
        .btn-next { background: rgba(255,255,255,0.1); color: white; font-size: 12px; }

        .sound-station { display: flex; justify-content: center; margin-top: 15px; }
        .sound-btn { padding: 10px; font-size: 12px; background: rgba(0,0,0,0.5); color: #888; border: 1px solid #444; width: 100px; }
        .sound-btn.active { color: #fff; border-color: #ff0055; box-shadow: 0 0 10px rgba(255,0,85,0.3); }

        .stats-container { display: flex; justify-content: space-between; margin-bottom: 15px; font-size: 0.8rem; color: #aaa; }
        .badge { display: inline-block; width: 20px; height: 20px; vertical-align: middle; margin-left: 5px; opacity: 0; transition: 0.5s;}
        .badge.visible { opacity: 1; }
        .player-turn { font-size: 2rem; font-weight: 900; text-shadow: 0 0 15px rgba(255, 255, 255, 0.8); }

        #timer-container { display: none; margin: 15px auto; width: 80px; height: 80px; border-radius: 50%; border: 4px solid #0f0; align-items: center; justify-content: center; font-size: 1.5rem; font-weight: 900; box-shadow: 0 0 15px #0f0; transition: all 0.3s; }
        .timer-warning { border-color: #ffaa00 !important; color: #ffaa00; box-shadow: 0 0 20px #ffaa00 !important; }
        .timer-danger { border-color: #ff0000 !important; color: #ff0000; box-shadow: 0 0 30px #ff0000 !important; }

        .card-container { width: 100%; height: 250px; perspective: 1000px; margin: 20px 0; }
        .card { width: 100%; height: 100%; position: relative; transition: transform 0.8s cubic-bezier(0.4, 0.2, 0.2, 1); transform-style: preserve-3d; }
        .card.is-flipped { transform: rotateY(180deg); }
        .card-face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 20px; padding: 20px; box-sizing: border-box; border: 1px solid rgba(255,255,255,0.2); }
        .card-front { background: rgba(0, 0, 0, 0.6); }
        .card-back { background: rgba(10, 10, 15, 0.95); transform: rotateY(180deg); position: relative; overflow: hidden;}
        
        .card-bg-icon { position: absolute; width: 150px; height: 150px; opacity: 0.1; z-index: 0; }
        .prompt-type { font-size: 1.5rem; font-weight: 900; text-transform: uppercase; margin-bottom: 10px; z-index: 1; }
        .prompt-text { font-size: 1.1rem; line-height: 1.4; font-weight: 700; z-index: 1; }

        .particle { position: absolute; width: 8px; height: 8px; border-radius: 50%; pointer-events: none; z-index: 100; animation: explode 1s ease-out forwards; }
        @keyframes explode { 0% { transform: translate(0,0) scale(1); opacity: 1; } 100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; } }

        .btn-safe { position: fixed; bottom: 20px; width: auto; padding: 12px 35px; background: #ff0000; color: white; border-radius: 50px; box-shadow: 0 0 20px rgba(255, 0, 0, 0.8); z-index: 100; display: none; }
        #emergency-screen { display: none; position: fixed; inset: 0; background: rgba(220, 0, 0, 0.98); z-index: 200; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 30px; }
        #emergency-screen h1 { font-size: 3rem; color: white; -webkit-text-fill-color: white; }
        .svg-icon { fill: currentColor; }
    </style>
</head>

    let currentMusic = null;
    let isMuted = false;
    let audioCtx;

    function initAudioContext() {
        if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }

    function setMusicForMode(index) {
        if(currentMusic) currentMusic.pause();
        currentMusic = index <= 1 ? bgMusic1 : bgMusic2; 
        
        if(!isMuted) {
            currentMusic.currentTime = 0;
            currentMusic.play().catch(e => console.log("Tap a button to unlock audio."));
        }
    }

    function toggleMute() {
        isMuted = !isMuted;
        const btn = document.getElementById('snd-mute');
        if(isMuted) {
            if(currentMusic) currentMusic.pause();
            btn.innerText = "UNMUTE";
            btn.classList.add('active');
        } else {
            if(currentMusic) currentMusic.play();
            btn.innerText = "MUTE AUDIO";
            btn.classList.remove('active');
        }
    }

    function playTick() {
        if(!audioCtx || isMuted) return;
        let osc = audioCtx.createOscillator();
        let gain = audioCtx.createGain();
        osc.frequency.setValueAtTime(800, audioCtx.currentTime); 
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.05);
        osc.connect(gain).connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.1);
    }

    function startGame() {
        initAudioContext();
        players[0].name = document.getElementById('player1').value || "P1";
        players[1].name = document.getElementById('player2').value || "P2";
        const select = document.getElementById('mode-select');
        currentMode = select.value;
        currentModeIndex = select.selectedIndex;
        
        setMusicForMode(currentModeIndex);
        
        document.getElementById('setup-screen').style.display = 'none';
        document.getElementById('game-screen').style.display = 'block';
        document.getElementById('safe-word-btn').style.display = 'block';
        
        updateStats();
        updateTurnDisplay();
    }

    function updateTurnDisplay() {
        stopTimer();
        document.getElementById('turn-display').innerText = `${players[currentPlayerIndex].name}'s Turn`;
        document.getElementById('mode-display').innerText = `Playing: ${document.getElementById('mode-select').options[currentModeIndex].text}`;
        
        const card = document.getElementById('game-card');
        card.classList.remove('is-flipped');
        cardFlipped = false;
        document.getElementById('timer-container').style.display = 'none';
    }

    function updateStats() {
        document.getElementById('p1-stats').innerHTML = `${players[0].name}: ${players[0].t} T | ${players[0].d} D ${getBadge(0)}`;
        document.getElementById('p2-stats').innerHTML = `${getBadge(1)} ${players[1].name}: ${players[1].t} T | ${players[1].d} D`;

    function getBadge(index) {

    function spawnParticles(color) {

            p.style.background = color;

            p.style.setProperty('--ty', (Math.random() - 0.5) * 300 + 'px');
            document.body.appendChild(p);
            setTimeout(() => p.remove(), 1000);
        }
    }

    function getPrompt(type) {

        } else {
            card.classList.add('is-flipped');
            cardFlipped = true;
        }

        if(useTimer) startTimer();
    }

    function startTimer() {
        stopTimer();
        timeLeft = 60;
        const tc = document.getElementById('timer-container');
        tc.style.display = 'flex';
        tc.className = '';
        tc.innerText = timeLeft;
        
        timerInterval = setInterval(() => {
            timeLeft--;
            tc.innerText = timeLeft;
            if (timeLeft > 0) playTick(); 
            
            if(timeLeft <= 30 && timeLeft > 10) { tc.className = 'timer-warning'; }
            if(timeLeft <= 10 && timeLeft > 0) { tc.className = 'timer-danger'; }
            if(timeLeft <= 0) { stopTimer(); tc.innerText = "UP!"; }
        }, 1000);
    }

    function stopTimer() { clearInterval(timerInterval); }

    function nextTurn() {
        currentPlayerIndex = currentPlayerIndex === 0 ? 1 : 0;
        document.body.style.background = "linear-gradient(-45deg, var(--bg-color-1), var(--bg-color-2), var(--bg-color-3), var(--bg-color-4))";
        updateTurnDisplay();
    }

    function triggerSafeWord() {
        document.getElementById('emergency-screen').style.display = 'flex';
        document.body.style.background = "#ff0000";
        stopTimer();
        if(currentMusic) currentMusic.pause();
        const card = document.getElementById('game-card');
        card.classList.remove('is-flipped');
        cardFlipped = false;
    }

    function resumeGame() {
        document.getElementById('emergency-screen').style.display = 'none';
        if(currentMusic && !isMuted) currentMusic.play();
        nextTurn();
    }
